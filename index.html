<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tamagotchi V14 - Controles en Línea</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --shell-color1: #ff77ff;
            --shell-color2: #ff44aa;
            --shell-border: #cc2288;
            --btn-shadow: #aa6688;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            background: #0d0221;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* FONDO SYNTHWAVE */
        .synthwave-sun {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: linear-gradient(to bottom, #ffea00 0%, #ff2525 100%);
            border-radius: 50%; box-shadow: 0 0 60px rgba(255, 50, 50, 0.6); z-index: 0;
        }
        .synthwave-sun::after {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 50%;
            background: repeating-linear-gradient(to bottom, transparent, transparent 10px, #0d0221 10px, #0d0221 15px);
            border-radius: 0 0 150px 150px;
        }
        .synthwave-grid {
            position: absolute; bottom: 0; width: 200%; height: 50vh; left: -50%;
            background-image: linear-gradient(rgba(255, 0, 128, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg); z-index: 0;
            mask-image: linear-gradient(to top, #000 0%, transparent 80%);
            -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 80%);
            animation: gridMove 1.5s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 40px; } }

        /* CARCASA */
        .device {
            background: radial-gradient(circle at 30% 15%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%), linear-gradient(135deg, var(--shell-color1), var(--shell-color2));
            width: 340px; height: 540px; border-radius: 50% 50% 20% 20% / 40% 40% 15% 15%;
            padding: 40px 30px 30px 30px;
            box-shadow: 0px 20px 50px rgba(0,0,0,0.8), inset 0px 8px 15px rgba(255,255,255,0.5), inset 0px -15px 25px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; border: 2px solid rgba(0,0,0,0.2);
            position: relative; z-index: 1;
        }
        .header-bar { width: 100%; text-align: center; margin-bottom: 15px; }
        .brand-title { font-size: 12px; color: rgba(255,255,255,0.9); text-shadow: 1px 1px 0px rgba(0,0,0,0.4); letter-spacing: 1px; }

        /* Pantalla bloqueada para que no encoja */
        .screen-container {
            width: 240px; height: 200px; background: #1a1a1a; border-radius: 20px; padding: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.5), inset 0px 3px 5px rgba(255,255,255,0.3), inset 0px -3px 5px rgba(0,0,0,0.5);
            position: relative; margin-bottom: 10px; flex-shrink: 0; 
        }
        .screen {
            width: 100%; height: 100%; background-color: #c4cfa1; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 4px solid #333;
        }
        .screen::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
            pointer-events: none; z-index: 20;
        }

        .view { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; z-index: 2; position: relative; justify-content: center; gap: 5px; padding-top: 5px; }
        .hidden-view { display: none !important; }
        .pet-header { display: flex; flex-direction: column; align-items: center; }
        .pet-name { font-size: 11px; color: #222; }
        .pet-age { font-size: 6px; color: #222; margin-top: 2px; }
        .pet-sprite { font-size: 40px; filter: contrast(150%) grayscale(100%); text-shadow: 2px 2px 0px rgba(0,0,0,0.2); animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        .poop-icon { position: absolute; font-size: 18px; filter: grayscale(100%) contrast(150%); z-index: 3; bottom: 70px; right: 40px; }

        .stats { width: 85%; display: flex; flex-direction: column; gap: 4px; }
        .stat-bar { font-size: 7px; color: #222; display: flex; justify-content: space-between; align-items: center; }
        .bar-container { width: 60px; height: 6px; background: rgba(0,0,0,0.2); border: 1px solid #222; }
        .bar-fill { height: 100%; background: #222; transition: width 0.5s; }
        .apple-count { font-size: 8px; color: #222; margin-top: 2px; }

        /* MINIJUEGO OPTIMIZADO GPU */
        #game-player { position: absolute; bottom: 10px; font-size: 35px; filter: grayscale(100%) contrast(150%); z-index: 5; will-change: transform; }
        .game-item { position: absolute; top: -20px; font-size: 25px; filter: grayscale(100%) contrast(150%); z-index: 4; will-change: transform; }
        #game-ui { position: absolute; top: 5px; width: 100%; text-align: center; font-size: 8px; color: #222; z-index: 6; line-height: 1.5; }
        .shield-active { filter: grayscale(100%) contrast(150%) drop-shadow(0 0 5px gold) !important; }
        .hurt-active { filter: grayscale(100%) contrast(150%) opacity(0.5) !important; }

        .death-text { font-size: 9px; color: #222; text-align: center; margin: 10px; line-height: 1.8; }
        .btn-revive { margin-top: 15px; background: #222; color: #c4cfa1; border: none; padding: 10px 20px; font-family: inherit; font-size: 10px; cursor: pointer; border-radius: 5px; }

        /* CONTROLES */
        .bottom-controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .action-buttons { display: flex; gap: 12px; }
        .btn { 
            width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(to bottom, #f5f5f5, #c4c4c4);
            border: 1px solid #999; box-shadow: 0px 4px 0px var(--btn-shadow), 0px 6px 10px rgba(0,0,0,0.3), inset 0px 2px 2px rgba(255,255,255,0.8);
            cursor: pointer; font-size: 7px; font-family: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center; outline: none; color: #333; 
        }
        .btn:active { transform: translateY(4px); box-shadow: 0px 0px 0px var(--btn-shadow), 0px 2px 5px rgba(0,0,0,0.3), inset 0px 2px 2px rgba(0,0,0,0.2); }
        
        /* BOTONES DE MOVIMIENTO EN LÍNEA RECTA */
        .move-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 30px; /* Espacio entre izquierdo y derecho */
            width: 100%; 
            margin-top: 5px;
            touch-action: none; 
        }
        .move-btn { 
            width: 60px; height: 60px; /* Grandes y cómodos */
            background: linear-gradient(to bottom, #444, #222); border: 1px solid #111; color: #ccc; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 28px; border-radius: 50%; user-select: none; 
            box-shadow: inset 0px 2px 2px rgba(255,255,255,0.2), 0px 3px 3px rgba(0,0,0,0.5);
            touch-action: none;
        }
        .move-btn:active { background: #111; box-shadow: inset 0px 4px 6px rgba(0,0,0,0.8); transform: scale(0.95); }

        .bottom-extras { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .color-picker { display: flex; gap: 6px; }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); cursor: pointer; box-shadow: inset 0px 1px 1px rgba(255,255,255,0.4); }
        .music-btn { background: rgba(0,0,0,0.2); border: none; color: #fff; font-size: 14px; cursor: pointer; padding: 2px 5px; border-radius: 4px; }

        .speaker-holes { display: grid; grid-template-columns: repeat(4, 5px); gap: 4px; margin-top: 15px; opacity: 0.4; }
        .speaker-holes div { width: 5px; height: 5px; background: #000; border-radius: 50%; box-shadow: inset 0px 1px 1px rgba(255,255,255,0.2); }

        .message { font-size: 8px; color: rgba(255,255,255,0.9); margin-top: 10px; height: 10px; text-align: center; text-shadow: 1px 1px 0px #000; }
    </style>
</head>
<body>

    <div class="synthwave-sun"></div>
    <div class="synthwave-grid"></div>

<div class="device" id="device">
    <div class="header-bar">
        <div class="brand-title">TAMAGOTCHI</div>
    </div>

    <div class="screen-container">
        <div class="screen" id="screen">
            <div class="view" id="pet-view">
                <div class="pet-header">
                    <div class="pet-name" id="petNameDisplay">Mochi</div>
                    <div class="pet-age" id="petAgeDisplay">Día 1</div>
                </div>
                <div class="pet-sprite" id="petSprite">🥚</div>
                <div class="poop-icon hidden-view" id="poopIcon">💩</div>
                <div class="stats">
                    <div class="stat-bar">COM <div class="bar-container"><div class="bar-fill" id="hungerBar" style="width: 100%"></div></div></div>
                    <div class="stat-bar">FEL <div class="bar-container"><div class="bar-fill" id="happyBar" style="width: 100%"></div></div></div>
                    <div class="stat-bar">ENE <div class="bar-container"><div class="bar-fill" id="energyBar" style="width: 100%"></div></div></div>
                </div>
                <div class="apple-count">🍎 Manzanas: <span id="appleCount">5</span></div>
            </div>

            <div class="view hidden-view" id="game-view">
                <div id="game-ui">Puntos: 0<br>Récord: 0<br>❤️❤️❤️</div>
                <div id="game-player">🐤</div>
            </div>

            <div class="view hidden-view" id="dead-view">
                <div class="death-text" id="death-message">Mochi ha fallecido...</div>
                <button class="btn-revive" onclick="revivePet()">REVIVIR</button>
            </div>
        </div>
    </div>
    
    <div class="message" id="messageText">¡Cuida de Mochi!</div>

    <div class="bottom-controls">
        <div class="action-buttons">
            <button class="btn" onclick="action('feed')">COMER</button>
            <button class="btn" onclick="action('play')">JUGAR</button>
            <button class="btn" onclick="action('sleep')">DORMIR</button>
            <button class="btn" onclick="action('clean')">LIMPIAR</button>
        </div>
        
        <!-- Botones de movimiento en línea recta -->
        <div class="move-buttons">
            <div class="move-btn" id="btnLeft">◀</div>
            <div class="move-btn" id="btnRight">▶</div>
        </div>
        
        <div class="bottom-extras">
            <div class="color-picker">
                <div class="color-dot" style="background:#ff77ff" onclick="changeShell('pink')"></div>
                <div class="color-dot" style="background:#00bfff" onclick="changeShell('blue')"></div>
                <div class="color-dot" style="background:#ffd700" onclick="changeShell('yellow')"></div>
                <div class="color-dot" style="background:#32cd32" onclick="changeShell('green')"></div>
                <div class="color-dot" style="background:#ff4c4c" onclick="changeShell('red')"></div>
            </div>
            <button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵</button>
        </div>

        <div class="speaker-holes">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
        </div>
    </div>
</div>

<script>
    // SISTEMA DE SONIDO
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(freq, duration, type = 'square', volume = 0.1) {
        initAudio(); let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    let bgMusicInterval, isMusicPlaying = false, melodyIndex = 0;
    const bgMelody = [
        {f: 392, d: 0.2}, {f: 523, d: 0.2}, {f: 659, d: 0.2}, {f: 784, d: 0.4},
        {f: 659, d: 0.2}, {f: 784, d: 0.4}, {f: 0, d: 0.2},
        {f: 587, d: 0.2}, {f: 698, d: 0.2}, {f: 880, d: 0.4}, {f: 698, d: 0.2},
        {f: 587, d: 0.2}, {f: 523, d: 0.4}, {f: 0, d: 0.2}
    ];
    function startBgMusic() {
        if (isMusicPlaying) return; isMusicPlaying = true; document.getElementById("musicBtn").innerText = "🎵";
        bgMusicInterval = setInterval(() => {
            let note = bgMelody[melodyIndex];
            if (note.f > 0) playSound(note.f, note.d, 'triangle', 0.04);
            melodyIndex++; if (melodyIndex >= bgMelody.length) melodyIndex = 0;
        }, 250);
    }
    function toggleMusic() {
        initAudio();
        if (isMusicPlaying) { clearInterval(bgMusicInterval); isMusicPlaying = false; document.getElementById("musicBtn").innerText = "🔇"; } 
        else startBgMusic();
    }
    document.body.addEventListener('click', function startAudio() { initAudio(); if (!isMusicPlaying) startBgMusic(); document.body.removeEventListener('click', startAudio); }, { once: true });
    function playMelody(notes) { initAudio(); notes.forEach((note, i) => { setTimeout(() => playSound(note.freq, note.dur, note.type || 'square', 0.15), i * (note.delay || 150)); }); }

    const shells = {
        pink: { c1: '#ff77ff', c2: '#ff44aa', border: '#cc2288', shadow: '#aa6688' },
        blue: { c1: '#00bfff', c2: '#0077cc', border: '#004488', shadow: '#336688' },
        yellow: { c1: '#ffd700', c2: '#cc9900', border: '#886600', shadow: '#aa8844' },
        green: { c1: '#90ee90', c2: '#228b22', border: '#006400', shadow: '#446644' },
        red: { c1: '#ff5c5c', c2: '#cc0000', border: '#880000', shadow: '#884444' }
    };
    function changeShell(color) {
        playSound(800, 0.05); const s = shells[color]; const root = document.documentElement;
        root.style.setProperty('--shell-color1', s.c1); root.style.setProperty('--shell-color2', s.c2);
        root.style.setProperty('--shell-border', s.border); root.style.setProperty('--btn-shadow', s.shadow);
    }

    let pet = {}, currentSkinIndex = 0, birthTime = Date.now(), highScore = 0;
    const allEvolutions = ["🥚", "🐣", "🐤", "🐥", "🐰", "🐱", "🐶", "🦊", "🐼", "🦁", "🐯", "🐻", "👾", "🐲", "🐉"];

    function initPet() {
        pet = { name: "Mochi", sprite: "🥚", hunger: 100, happy: 100, energy: 100, age: 1, isAlive: true, isSleeping: false, hasPoop: false, poopX: 0, poopY: 0, apples: 5, skinsUnlocked: allEvolutions };
        currentSkinIndex = 0; birthTime = Date.now();
    }
    function startGame() {
        initPet();
        document.getElementById("pet-view").classList.remove("hidden-view");
        document.getElementById("game-view").classList.add("hidden-view");
        document.getElementById("dead-view").classList.add("hidden-view");
        updateUI();
    }
    function revivePet() { playSound(523, 0.1); playSound(659, 0.1); playSound(784, 0.2); startGame(); }

    function action(type) {
        if (!pet.isAlive || isPlayingMiniGame) return;
        playSound(440, 0.05);
        if (pet.sprite === "🥚" && type !== 'clean') { document.getElementById("messageText").innerText = "Aún es un huevo, espera..."; return; }
        if (pet.isSleeping && type !== 'sleep') { document.getElementById("messageText").innerText = "¡Zzz... Está durmiendo!"; return; }
        switch(type) {
            case 'feed':
                if (pet.apples > 0) { if (pet.hunger < 100) { pet.apples--; pet.hunger += 20; pet.happy -= 5; document.getElementById("messageText").innerText = "¡Ñam ñam!"; playSound(600, 0.1); playSound(800, 0.1); } else document.getElementById("messageText").innerText = "No tiene hambre."; } 
                else document.getElementById("messageText").innerText = "¡Sin manzanas! Juega para ganar.";
                break;
            case 'play': startMiniGame(); break;
            case 'sleep': pet.isSleeping = !pet.isSleeping; document.getElementById("messageText").innerText = pet.isSleeping ? "Durmiendo... Zzz" : "¡Buenos días!"; if(pet.isSleeping) playSound(300, 0.5, 'sine'); break;
            case 'clean': if (pet.hasPoop) { pet.hasPoop = false; pet.happy += 10; document.getElementById("messageText").innerText = "¡Limpio y reluciente!"; playSound(500, 0.05); playSound(700,0.1); } else document.getElementById("messageText").innerText = "No hay que limpiar."; break;
        }
        capStats(); updateUI();
    }

    function evolve() {
        if (currentSkinIndex < pet.skinsUnlocked.length - 1) {
            currentSkinIndex++; pet.sprite = pet.skinsUnlocked[currentSkinIndex];
            document.getElementById("messageText").innerText = "¡Mochi ha evolucionado!";
            document.getElementById("game-player").innerText = pet.sprite;
            playMelody([{freq:523,dur:0.1}, {freq:659,dur:0.1}, {freq:784,dur:0.2}]);
        }
    }

    setInterval(() => {
        if (!pet.isAlive || isPlayingMiniGame) return;
        if (pet.sprite === "🥚" && Math.floor((Date.now() - birthTime) / 1000) > 10) evolve();
        if (pet.isSleeping) { pet.energy += 5; pet.hunger -= 1; } else { pet.hunger -= 2; pet.happy -= 2; pet.energy -= 1; }
        if (!pet.hasPoop && pet.sprite !== "🥚" && Math.random() < 0.1) { pet.hasPoop = true; pet.poopX = Math.random() * 200 + 30; pet.poopY = Math.random() * 100 + 80; document.getElementById("messageText").innerText = "¡Mochi hizo sus necesidades!"; playSound(200, 0.2, 'sawtooth'); }
        if (pet.hasPoop) pet.happy -= 2;
        let minutesLived = Math.floor((Date.now() - birthTime) / 60000); let currentDay = minutesLived + 1;
        if (currentDay > pet.age) { pet.age = currentDay; evolve(); }
        if (pet.hunger <= 0 || pet.happy <= 0) {
            pet.isAlive = false; document.getElementById("messageText").innerText = "";
            document.getElementById("pet-view").classList.add("hidden-view");
            document.getElementById("dead-view").classList.remove("hidden-view");
            document.getElementById("death-message").innerHTML = `Mochi ha fallecido...<br><br>Días vividos: ${pet.age}<br>Récord minijuego: ${highScore} pts`;
            playMelody([{freq:440,dur:0.2,type:'sawtooth'}, {freq:330,dur:0.2,type:'sawtooth'}, {freq:220,dur:0.5,type:'sawtooth'}]);
        }
        capStats(); updateUI();
    }, 2000);

    function capStats() { pet.hunger = Math.max(0, Math.min(100, pet.hunger)); pet.happy = Math.max(0, Math.min(100, pet.happy)); pet.energy = Math.max(0, Math.min(100, pet.energy)); }
    function updateUI() {
        document.getElementById("petNameDisplay").innerText = pet.name;
        document.getElementById("petAgeDisplay").innerText = "Día " + pet.age;
        document.getElementById("petSprite").innerText = pet.isSleeping ? "💤" : pet.sprite;
        document.getElementById("appleCount").innerText = pet.apples;
        let poopEl = document.getElementById("poopIcon");
        if(pet.hasPoop) { poopEl.classList.remove("hidden-view"); poopEl.style.left = pet.poopX + "px"; poopEl.style.top = pet.poopY + "px"; } else poopEl.classList.add("hidden-view");
        document.getElementById("hungerBar").style.width = pet.hunger + "%";
        document.getElementById("happyBar").style.width = pet.happy + "%";
        document.getElementById("energyBar").style.width = pet.energy + "%";
    }

    // ==========================================
    // MINI-JUEGO OPTIMIZADO (Límites Ajustados)
    // ==========================================
    let isPlayingMiniGame = false;
    let playerPos = 95, gameScore = 0, gameLives = 3;
    let items = [], moveDir = 0, fallSpeed = 2, isInvincible = false, hitCooldown = false;
    let appleSpawnRate = 0.015, poopSpawnRate = 0.010;
    let gamePlayerEl, gameViewEl;
    let lastTime = 0;
    let animationFrameId;

    function startMiniGame() {
        if (pet.energy < 20) { document.getElementById("messageText").innerText = "Mochi está muy cansado."; playSound(150, 0.3, 'sawtooth'); return; }
        isPlayingMiniGame = true; gameScore = 0; gameLives = 3; fallSpeed = 2; appleSpawnRate = 0.015; poopSpawnRate = 0.010; items = [];
        document.getElementById("pet-view").classList.add("hidden-view");
        document.getElementById("game-view").classList.remove("hidden-view");
        document.getElementById("messageText").innerText = "¡Esquiva la caca, atrapa manzanas!";
        
        gamePlayerEl = document.getElementById("game-player");
        gameViewEl = document.getElementById("game-view");
        
        playerPos = 95; // Centrado para la nueva pantalla
        gamePlayerEl.style.transform = `translate3d(${playerPos}px, 0, 0)`;
        gamePlayerEl.innerText = pet.sprite;
        gamePlayerEl.classList.remove("shield-active", "hurt-active");
        updateGameUI();
        
        lastTime = performance.now();
        animationFrameId = requestAnimationFrame(updateGame);
    }

    function updateGameUI() {
        let hearts = "❤️".repeat(gameLives);
        document.getElementById("game-ui").innerHTML = "Puntos: " + gameScore + "<br>Récord: " + highScore + "<br>" + hearts;
    }

    function updateGame(timestamp) {
        if (!isPlayingMiniGame) return;
        const deltaTime = (timestamp - lastTime) / 16.6;
        lastTime = timestamp;

        playerPos += moveDir * 3.5 * deltaTime; 
        if(playerPos < 0) playerPos = 0;
        if(playerPos > 195) playerPos = 195; // Límite exacto de la pantalla
        gamePlayerEl.style.transform = `translate3d(${playerPos}px, 0, 0)`;

        if (Math.random() < appleSpawnRate) spawnItem('🍎');
        if (Math.random() < poopSpawnRate) spawnItem('💩');
        if (Math.random() < 0.005) spawnItem('⭐');

        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.y += fallSpeed * deltaTime;
            it.el.style.transform = `translate3d(${it.x}px, ${it.y}px, 0)`;

            if (it.y > 130) { // Colisión ajustada
                if (Math.abs(it.x - playerPos) < 30) {
                    if (it.type === '🍎') {
                        gameScore += 10; pet.apples++; playSound(880, 0.05);
                        if(gameScore % 50 === 0) { fallSpeed += 0.5; appleSpawnRate += 0.005; poopSpawnRate += 0.005; }
                        updateGameUI();
                    } else if (it.type === '⭐') { activateInvincibility(); } 
                    else if (it.type === '💩') {
                        if (!isInvincible && !hitCooldown) {
                            gameLives--; hitCooldown = true; playSound(110, 0.2, 'sawtooth');
                            gamePlayerEl.classList.add("hurt-active");
                            setTimeout(() => { hitCooldown = false; gamePlayerEl.classList.remove("hurt-active"); }, 1000);
                            updateGameUI();
                            if (gameLives <= 0) { endMiniGame(); return; }
                        }
                    }
                    it.el.remove(); items.splice(i, 1);
                } else if (it.y > 180) { it.el.remove(); items.splice(i, 1); } // Limpieza ajustada
            }
        }
        animationFrameId = requestAnimationFrame(updateGame);
    }

    function activateInvincibility() {
        isInvincible = true; playMelody([{freq:523,dur:0.1}, {freq:659,dur:0.1}, {freq:784,dur:0.2}]);
        gamePlayerEl.classList.add("shield-active");
        document.getElementById("game-ui").innerHTML = "Puntos: " + gameScore + "<br>¡INVENCIBLE! ⭐<br>❤️".repeat(gameLives);
        setTimeout(() => { isInvincible = false; gamePlayerEl.classList.remove("shield-active"); updateGameUI(); }, 10000);
    }

    function spawnItem(type) {
        let el = document.createElement('div');
        el.className = 'game-item'; el.innerText = type;
        let xPos = Math.random() * 180; // Ajustado a la pantalla
        el.style.transform = `translate3d(${xPos}px, -20px, 0)`;
        gameViewEl.appendChild(el);
        items.push({ el: el, y: -20, x: xPos, type: type });
    }

    // === CONTROLES EN LÍNEA ===
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');

    function pressLeft(e) { e.preventDefault(); if(isPlayingMiniGame) moveDir = -1; }
    function pressRight(e) { e.preventDefault(); if(isPlayingMiniGame) moveDir = 1; }
    function release(e) { e.preventDefault(); moveDir = 0; }

    btnLeft.addEventListener('pointerdown', pressLeft);
    btnLeft.addEventListener('pointerup', release);
    btnLeft.addEventListener('pointerleave', release);
    btnLeft.addEventListener('pointercancel', release);

    btnRight.addEventListener('pointerdown', pressRight);
    btnRight.addEventListener('pointerup', release);
    btnRight.addEventListener('pointerleave', release);
    btnRight.addEventListener('pointercancel', release);

    document.addEventListener('keydown', (e) => {
        if(!isPlayingMiniGame) return;
        if(e.key === "ArrowLeft") moveDir = -1;
        if(e.key === "ArrowRight") moveDir = 1;
    });
    document.addEventListener('keyup', (e) => {
        if(e.key === "ArrowLeft" || e.key === "ArrowRight") moveDir = 0;
    });

    function endMiniGame() {
        cancelAnimationFrame(animationFrameId);
        isPlayingMiniGame = false;
        items.forEach(it => it.el.remove()); items = [];
        let recordMessage = "";
        if (gameScore > highScore) { highScore = gameScore; recordMessage = " ¡NUEVO RÉCORD!"; playMelody([{freq:784,dur:0.1}, {freq:880,dur:0.1}, {freq:988,dur:0.2}]); }
        document.getElementById("game-view").classList.add("hidden-view");
        document.getElementById("pet-view").classList.remove("hidden-view");
        let bonus = Math.floor(gameScore / 5); pet.happy += bonus; pet.hunger -= 10; pet.energy -= 15;
        document.getElementById("messageText").innerText = "Fin del juego. +" + bonus + " de felicidad." + recordMessage;
        capStats(); updateUI();
    }

    window.onload = startGame;
</script>
</body>
</html>
